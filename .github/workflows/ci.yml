name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync and test
        run: |
          uv sync --all-groups --all-extras
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/
          uv run pytest tests/ -q
