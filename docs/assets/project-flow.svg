<svg xmlns="http://www.w3.org/2000/svg" lang="en" viewBox="0 0 800 800" width="800" height="800"
     preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="ct-project-flow-title" aria-describedby="ct-project-flow-desc">
  <title id="ct-project-flow-title">chunktuner project flow</title>
  <desc id="ct-project-flow-desc">Input documents, chunktuner processing and evaluation, recommended chunking strategy and config, with Python library, CLI, and MCP interfaces.</desc>

  <defs>
    <marker id="ct-project-flow-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <filter id="ct-project-flow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#f8fafc"/>

  <g transform="translate(0, -28)"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">

    <!-- Top header -->
    <text x="400" y="68" text-anchor="middle"
          font-size="30" font-weight="700" fill="#0f172a" letter-spacing="-0.5">chunktuner</text>
    <text x="400" y="100" text-anchor="middle"
          font-size="14" fill="#64748b">Auto Chunking Tuner for RAG Pipelines</text>
    <line x1="180" y1="122" x2="620" y2="122" stroke="#e2e8f0" stroke-width="1"/>

    <!-- ═══ BOX 1 — Documents ═══ -->
    <rect x="44" y="178" width="202" height="300" rx="14"
          fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#ct-project-flow-shadow)"/>
    <rect x="112" y="163" width="66" height="22" rx="11" fill="#3b82f6"/>
    <text x="145" y="178" text-anchor="middle"
          font-size="11" font-weight="600" fill="#ffffff">① INPUT</text>
    <text x="145" y="237" text-anchor="middle" font-size="38" aria-hidden="true">📄</text>
    <text x="145" y="270" text-anchor="middle"
          font-size="15" font-weight="700" fill="#1e3a8a">Your Documents</text>
    <line x1="68" y1="284" x2="222" y2="284" stroke="#bfdbfe" stroke-width="1"/>
    <text x="145" y="308" text-anchor="middle"
          font-size="13" fill="#1d4ed8">Markdown · PDF</text>
    <text x="145" y="330" text-anchor="middle"
          font-size="13" fill="#1d4ed8">Code · HTML · Plain text</text>
    <text x="145" y="365" text-anchor="middle"
          font-size="12" fill="#3b82f6">Any text corpus</text>
    <text x="145" y="390" text-anchor="middle"
          font-size="12" fill="#3b82f6">Zero API cost to start</text>
    <text x="145" y="412" text-anchor="middle"
          font-size="12" fill="#3b82f6">Dry-run estimate first</text>
    <text x="145" y="450" text-anchor="middle"
          font-size="11" fill="#60a5fa" font-style="italic">Files · URLs · Repos</text>

    <line x1="250" y1="328" x2="296" y2="328"
          stroke="#94a3b8" stroke-width="2" marker-end="url(#ct-project-flow-arrow)"/>

    <!-- ═══ BOX 2 — chunktuner ═══ -->
    <rect x="299" y="178" width="202" height="300" rx="14"
          fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5" filter="url(#ct-project-flow-shadow)"/>
    <rect x="355" y="163" width="90" height="22" rx="11" fill="#7c3aed"/>
    <text x="400" y="178" text-anchor="middle"
          font-size="11" font-weight="600" fill="#ffffff">② PROCESS</text>
    <text x="400" y="237" text-anchor="middle" font-size="38" aria-hidden="true">⚙️</text>
    <text x="400" y="270" text-anchor="middle"
          font-size="15" font-weight="700" fill="#3b0764">chunktuner</text>
    <line x1="323" y1="284" x2="477" y2="284" stroke="#ddd6fe" stroke-width="1"/>
    <text x="400" y="308" text-anchor="middle"
          font-size="13" fill="#4c1d95">10 chunking strategies</text>
    <text x="400" y="330" text-anchor="middle"
          font-size="13" fill="#4c1d95">Retrieval evaluation</text>
    <text x="400" y="365" text-anchor="middle"
          font-size="12" fill="#6d28d9">Token Recall · MRR · NDCG</text>
    <text x="400" y="387" text-anchor="middle"
          font-size="12" fill="#6d28d9">Optional RAGAS metrics</text>
    <text x="400" y="412" text-anchor="middle"
          font-size="12" fill="#6d28d9">LiteLLM embeddings</text>
    <text x="400" y="450" text-anchor="middle"
          font-size="11" fill="#8b5cf6" font-style="italic">SQLite cache · Parallel grid</text>

    <line x1="505" y1="328" x2="551" y2="328"
          stroke="#94a3b8" stroke-width="2" marker-end="url(#ct-project-flow-arrow)"/>

    <!-- ═══ BOX 3 — Chunking Strategy ═══ -->
    <rect x="554" y="178" width="202" height="300" rx="14"
          fill="#fef9c3" stroke="#fde047" stroke-width="1.5" filter="url(#ct-project-flow-shadow)"/>
    <rect x="611" y="163" width="86" height="22" rx="11" fill="#ca8a04"/>
    <text x="654" y="178" text-anchor="middle"
          font-size="11" font-weight="600" fill="#ffffff">③ CONFIG</text>
    <text x="655" y="237" text-anchor="middle" font-size="38" aria-hidden="true">🏆</text>
    <text x="655" y="270" text-anchor="middle"
          font-size="15" font-weight="700" fill="#713f12">Chunking Strategy</text>
    <line x1="578" y1="284" x2="732" y2="284" stroke="#fef08a" stroke-width="1"/>
    <text x="655" y="308" text-anchor="middle"
          font-size="13" fill="#78350f">Ranked by retrieval score</text>
    <text x="655" y="330" text-anchor="middle"
          font-size="13" fill="#78350f">Reproducible config</text>
    <text x="655" y="365" text-anchor="middle"
          font-size="12" fill="#92400e">→ .autochunk.yaml</text>
    <text x="655" y="387" text-anchor="middle"
          font-size="12" fill="#92400e">Strategy + params pinned</text>
    <text x="655" y="412" text-anchor="middle"
          font-size="12" fill="#92400e">Drop into any RAG stack</text>
    <text x="655" y="450" text-anchor="middle"
          font-size="11" fill="#b45309" font-style="italic">Evidence-backed · Repeatable</text>

    <!-- Bottom — interfaces -->
    <text x="400" y="536" text-anchor="middle"
          font-size="12" fill="#94a3b8" letter-spacing="1">USE AS</text>

    <rect x="108" y="552" width="152" height="36" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ct-project-flow-shadow)"/>
    <text x="184" y="575" text-anchor="middle" font-size="13" fill="#1e293b">🐍 Python Library</text>

    <rect x="324" y="552" width="152" height="36" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ct-project-flow-shadow)"/>
    <text x="400" y="575" text-anchor="middle" font-size="13" fill="#1e293b">💻 CLI · chunk-tune</text>

    <rect x="540" y="552" width="152" height="36" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ct-project-flow-shadow)"/>
    <text x="616" y="575" text-anchor="middle" font-size="13" fill="#1e293b">🤖 MCP Server</text>

    <text x="400" y="650" text-anchor="middle"
          font-size="13" fill="#64748b">Benchmark chunking on your documents. Get a recommended config.</text>
  </g>
</svg>
